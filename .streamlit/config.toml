[theme]
base = "light"

# Color principal de Streamlit (acentos, sliders, toggles, tabs activos)
# Usamos el celeste corporativo del manual de marca WL Hnos & Asoc
primaryColor = "#1595BC"

# Fondos
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"

# Texto base (navy corporativo)
textColor = "#102250"

# Familia base. La tipografia real (Poppins/Open Sans) se inyecta por CSS en app.py
font = "sans serif"

[client]
showSidebarNavigation = true

[server]
maxUploadSize = 500

[browser]
gatherUsageStats = false
